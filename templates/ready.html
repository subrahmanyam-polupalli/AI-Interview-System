
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ready</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="hero">
    <div class="hero-card">
      <div class="brand">Ready to begin</div>
      <h1>Welcome {{ name }}</h1>
      <p class="lead">

      <div class="actions">
        <a class="btn primary" href="/interview">Start Interview</a>
        <a class="btn dark" href="/dashboard">My Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
