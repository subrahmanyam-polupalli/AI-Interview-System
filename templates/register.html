
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="form-wrap">
    <div class="form-card">
      <h1 style="font-size:34px; margin-bottom:8px;">Create your profile</h1>
      <p class="small-note">Enter your basic details to begin the interview journey.</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" class="form-grid">
        <div>
          <label>Name</label>
          <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div>
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div>
          <label>Age</label>
          <input type="number" name="age" min="1" placeholder="Enter your age" required>
        </div>

        <button type="submit" class="btn primary" style="width:100%;">Continue</button>
      </form>
    </div>
  </div>
</body>
</html>
