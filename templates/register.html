<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Register</title>

<link rel="stylesheet" href="/static/css/style.css">

<style>

.form-box{

margin-top:80px;

}

input{

padding:10px;

width:250px;

margin:10px;

border-radius:8px;

border:none;

}

</style>

</head>

<body>

<div class="form-box">

<h2>Enter Your Details</h2>

<form method="post" action="/register">

<input
type="text"
name="name"
placeholder="Enter Name"
required
>

<br>

<input
type="email"
name="email"
placeholder="Enter Email"
required
>

<br>

<input
type="number"
name="age"
placeholder="Enter Age"
required
>

<br>

<button
type="submit"
class="btn"
>
Start Interview
</button>

</form>

</div>

</body>

</html>
