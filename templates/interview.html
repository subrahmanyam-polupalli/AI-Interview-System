
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Interview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <div class="brand">Interview Session</div>
        <div style="font-size:26px; font-weight:800; margin-top:8px;">{{ name }} · {{ role }}</div>
      </div>
      <div class="nav-links">
        <a class="btn dark" href="/dashboard">Dashboard</a>
        <a class="btn danger" href="/logout">Logout</a>
      </div>
    </div>

    <div class="interview-layout">
      <div class="avatar-box">
        <div id="avatarContainer"></div>
      </div>

      <div class="question-card">
        <div id="questionBox">Loading question...</div>

        <textarea id="answerBox" placeholder="Type your answer here..."></textarea>

        <div class="answer-actions">
          <button id="micButton" type="button" class="mic-btn" onclick="startVoice()" title="Click to speak">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/>
            </svg>
          </button>
          <button class="btn primary" type="button" onclick="submitAnswer()">Submit Answer</button>
          <button class="btn dark" type="button" onclick="skipQuestion()">Skip</button>
        </div>

        <div id="voiceStatus" class="status-line">Click the microphone to record your answer.</div>
      </div>
    </div>
  </div>

  <script src="/static/js/avatar.js"></script>
  <script src="/static/js/voice.js"></script>
  <script>
    let currentQuestion = "";

    async function loadQuestion(){
      const res = await fetch("/get_question");
      const data = await res.json();

      if(data.finished){
        window.location.href = "/result";
        return;
      }

      currentQuestion = data.question;
      document.getElementById("questionBox").innerText = data.question;

      // Avatar speaks the question only. Mic stays off until user clicks it.
      if (typeof speak === "function") {
        speak(data.question);
      }
      document.getElementById("answerBox").value = "";
      stopVoice();
    }

    async function submitAnswer(){
      const answer = document.getElementById("answerBox").value || "";
      await fetch("/submit_answer", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify({ answer })
      });
      stopVoice();
      loadQuestion();
    }

    function skipQuestion(){
      document.getElementById("answerBox").value = "";
      stopVoice();
      submitAnswer();
    }

    loadQuestion();
  </script>
</body>
</html>
